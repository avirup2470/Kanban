<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Industrial Leap: Corporate Debt Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background: #0a0a0a;
            font-family: 'Courier Prime', monospace;
            touch-action: manipulation;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, #1a2a3a, #000000);
            overflow: hidden;
        }

        .industrial-bg {
            position: absolute;
            bottom: 0;
            width: 200%;
            height: 60%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200"><rect x="20" y="100" width="40" height="100" fill="%23111"/><rect x="80" y="50" width="60" height="150" fill="%23151515"/><rect x="160" y="120" width="30" height="80" fill="%23050505"/></svg>');
            background-repeat: repeat-x;
            opacity: 0.4;
            animation: scroll 40s linear infinite;
            z-index: 1;
        }

        .industrial-bg-near {
            position: absolute;
            bottom: -50px;
            width: 200%;
            height: 30%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="300" height="100" viewBox="0 0 300 100"><path d="M0 100 L50 20 L100 80 L150 10 L200 90 L250 30 L300 100" fill="none" stroke="%23222" stroke-width="5"/></svg>');
            background-repeat: repeat-x;
            opacity: 0.6;
            animation: scroll 20s linear infinite;
            z-index: 2;
        }

        @keyframes scroll {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        .smoke {
            position: absolute;
            background: rgba(100, 100, 100, 0.2);
            border-radius: 50%;
            pointer-events: none;
            animation: rise 5s infinite ease-out;
            z-index: 3;
        }

        @keyframes rise {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 0; }
            20% { opacity: 0.4; }
            100% { transform: translateY(-400px) scale(5) rotate(90deg); opacity: 0; }
        }

        .money-toast {
            position: absolute;
            color: #4ade80;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 2px 2px black;
            animation: floatUp 0.8s forwards;
            pointer-events: none;
            z-index: 150;
        }

        @keyframes floatUp {
            to { transform: translateY(-80px) scale(1.5); opacity: 0; }
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            pointer-events: none;
            z-index: 100;
        }

        .shake {
            animation: shake 0.2s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        #death-toast {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(153, 27, 27, 0.9);
            color: white;
            padding: 10px 20px;
            border-left: 4px solid #f87171;
            font-size: 0.75rem;
            text-transform: uppercase;
            z-index: 160;
            pointer-events: none;
            display: none;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="industrial-bg"></div>
    <div class="industrial-bg-near"></div>
    <div id="smoke-container"></div>
    
    <div id="ui-layer" class="flex justify-between items-start text-white">
        <div class="bg-black/60 p-3 rounded border-l-4 border-yellow-600 backdrop-blur-sm">
            <div class="text-2xl font-black text-yellow-500 font-mono tracking-tighter" id="money-display">BUDGET: $0</div>
            <div class="text-[10px] uppercase tracking-widest text-zinc-400 mt-1 font-bold italic" id="status-msg">Operation: Continuous Profit</div>
        </div>
        <div class="text-right bg-black/60 p-3 rounded border-r-4 border-zinc-500 backdrop-blur-sm">
            <div class="text-sm font-bold text-zinc-300" id="high-score-display">COLLECTIVE PEAK: $0</div>
            <div class="text-[9px] opacity-60 font-mono uppercase" id="sync-status">Syncing to Hive Mind...</div>
        </div>
    </div>

    <div id="death-toast"></div>

    <div id="overlay" class="fixed inset-0 bg-black/90 flex items-center justify-center z-[200] p-4 text-center">
        <div class="bg-zinc-900 border-x-4 border-t-8 border-zinc-700 p-8 max-w-md w-full rounded shadow-2xl">
            <div id="start-screen">
                <h1 class="text-4xl font-black text-white mb-2 italic tracking-tighter">INDUSTRIAL LEAP</h1>
                <p class="text-zinc-500 mb-6 text-xs uppercase tracking-widest">Shared Suffering Framework</p>
                <div class="grid grid-cols-2 gap-2 mb-8">
                    <button onclick="startGame('AVIRUP')" class="bg-blue-900/40 hover:bg-blue-600 p-4 rounded text-white border-b-4 border-blue-950 transition-all font-bold">AVIRUP 👷</button>
                    <button onclick="startGame('LAMA')" class="bg-red-900/40 hover:bg-red-600 p-4 rounded text-white border-b-4 border-red-950 transition-all font-bold">LAMA 🧔</button>
                    <button onclick="startGame('MASOOM')" class="bg-green-900/40 hover:bg-green-600 p-4 rounded text-white border-b-4 border-green-950 transition-all font-bold">MASOOM 👨‍🏭</button>
                    <button onclick="startGame('SAGAR')" class="bg-purple-900/40 hover:bg-purple-600 p-4 rounded text-white border-b-4 border-purple-950 transition-all font-bold">SAGAR 👮</button>
                    <button onclick="startGame('PRAVEEN')" class="bg-zinc-700 hover:bg-zinc-500 p-4 rounded text-white border-b-4 border-zinc-950 transition-all font-bold col-span-2">PRAVEEN 🧑‍💻</button>
                </div>
            </div>

            <div id="death-screen" class="hidden">
                <p class="text-red-600 font-black text-3xl mb-1 tracking-tighter">CONTRACT TERMINATED</p>
                <div class="my-4 py-2 border-y border-zinc-800">
                    <p class="text-zinc-500 text-[10px] uppercase font-bold mb-1">Reason for Termination:</p>
                    <p id="death-reason" class="text-white text-sm font-mono uppercase bg-red-950/30 py-1">COLLECTIVE DISMISSAL</p>
                </div>
                <p id="death-quote" class="text-zinc-400 text-xs mb-6 italic leading-relaxed">"Your sacrifice was slightly profitable."</p>
                <div class="bg-black/50 p-4 rounded border border-zinc-700 mb-6">
                    <p class="text-zinc-500 text-[10px] uppercase mb-1 font-bold">Shared Debt Accrued</p>
                    <p id="lost-money" class="text-yellow-500 text-4xl font-black font-mono">$0</p>
                </div>
                <div class="flex flex-col items-center">
                    <div class="text-zinc-400 text-[10px] mb-2 uppercase tracking-[0.2em]">Next Shift Starting In</div>
                    <div id="countdown" class="text-white text-5xl font-black font-mono">5</div>
                </div>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, push, onChildAdded } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBuHMgngzdgt_BDC6h4YEQVymDVmEbLs60",
        authDomain: "industrialleap.firebaseapp.com",
        databaseURL: "https://industrialleap-default-rtdb.firebaseio.com",
        projectId: "industrialleap",
        storageBucket: "industrialleap.firebasestorage.app",
        messagingSenderId: "1078886721555",
        appId: "1:1078886721555:web:22c18409c58909f92c37e6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const smokeContainer = document.getElementById('smoke-container');
    const gameContainer = document.getElementById('game-container');
    
    let gameState = 'START';
    let money = 0;
    let character = 'AVIRUP';
    let platforms = [];
    let items = [];
    const BASE_SPEED = 6;
    let speed = BASE_SPEED;
    let otherPlayersData = {}; 
    let ghostSims = {};      
    const gravity = 0.7;
    const jumpStrength = -16;

    const player = createPlayerEntity(150, 0);
    
    function createPlayerEntity(x, y) {
        return {
            x: x, 
            y: y, 
            vy: 0, 
            width: 45, 
            height: 45, 
            isGrounded: false, 
            rotation: 0,
            targetRotation: 0,
            status: 'ACTIVE',
            lastUpdate: Date.now()
        };
    }

    const buildingTypes = ['STEEL', 'CONCRETE', 'BRICK', 'METAL'];
    const headerQuotes = ["LUNCH BREAKS ARE DEBT-COLLECTIBLE.", "WE OWN THE AIR YOU BREATHE.", "SMILE: YOU'RE BEING LEVERAGED.", "REVENUE BEFORE RESPIRATION.", "YOUR SPINE IS COMPANY PROPERTY.", "UNPAID OVERTIME IS A PRIVILEGE.", "DON'T LOOK DOWN, LOOK AT THE MARGINS.", "PRODUCTIVITY IS THE ONLY PULSE.", "WORK HARDER: THE CEO NEEDS A HOBBY.", "QUITTING IS AN UNSANCTIONED EXPENSE."];
    const deathReasons = ["UNAUTHORIZED GRAVITATIONAL DESCENT", "KINETIC IMPACT RESTRUCTURING", "REDUNDANT BIOLOGICAL SYSTEM", "FAILURE TO DEFY PHYSICS", "EQUIPMENT DAMAGE VIA BODY IMPACT", "UNSCHEDULED FLOOR INSPECTION", "LACK of VERTICAL RETENTION", "OSHA-VIOLATING FALL TRAJECTORY", "SUDDEN CONTRACT EXPIRATION"];
    const deathQuotes = ["Your family will not be notified.", "HR has already filled your position.", "That fall was not covered by insurance.", "We've deducted the cost of the floor from your final pay.", "An unfortunate, but statistically likely outcome.", "The shareholders are disappointed in your performance.", "Your badge has been remotely deactivated.", "Please vacate the premises immediately.", "Your locker contents have been auctioned.", "Your carbon footprint has been successfully deleted."];

    let seedValue = 1;
    function syncedRandom() {
        let x = Math.sin(seedValue++) * 10000;
        return x - Math.floor(x);
    }

    const globalActionRef = ref(db, 'globalAction');
    const highRef = ref(db, 'highScore');
    const playersRef = ref(db, 'players');
    const deathEventsRef = ref(db, 'deathEvents');

    onValue(globalActionRef, (snapshot) => {
        const data = snapshot.val();
        if (data && gameState === 'PLAYING') {
            if (data.type === 'jump') {
                if (data.char === character) {
                    performJumpAction(player);
                } else if (ghostSims[data.char]) {
                    performJumpAction(ghostSims[data.char]);
                }
            }
        }
    });

    onValue(playersRef, (snapshot) => {
        const data = snapshot.val();
        if (data) {
            otherPlayersData = data;
            for (let char in data) {
                if (char !== character) {
                    if (!ghostSims[char]) {
                        ghostSims[char] = createPlayerEntity(350, player.y);
                    }
                    ghostSims[char].status = data[char].status;
                    ghostSims[char].lastUpdate = data[char].ts;
                }
            }
        }
    });

    onChildAdded(deathEventsRef, (snapshot) => {
        const data = snapshot.val();
        if (data && gameState === 'PLAYING' && data.char !== character) {
            showDeathToast(data.char, data.reason);
            playSfx('death');
            if (ghostSims[data.char]) ghostSims[data.char].status = 'DEAD';
        }
    });

    function showDeathToast(name, reason) {
        const toast = document.getElementById('death-toast');
        toast.innerText = `[OBITUARY] ${name} TERMINATED: ${reason}`;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 4000);
    }

    onValue(highRef, (snapshot) => {
        const val = snapshot.val() || 0;
        document.getElementById('high-score-display').innerText = `COLLECTIVE PEAK: $${val}`;
    });

    function updateHighScore(score) { set(highRef, score); }

    function syncState() {
        if (gameState === 'PLAYING') {
            set(ref(db, `players/${character}`), {
                y: player.y,
                rot: player.rotation,
                ts: Date.now(),
                status: 'ACTIVE'
            });
        }
    }
    setInterval(syncState, 150);

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSfx(type) {
        if (audioCtx.state === 'suspended') return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        switch(type) {
            case 'jump':
                osc.type = 'square'; osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
                gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(); osc.stop(now + 0.1); break;
            case 'land':
                osc.type = 'triangle'; osc.frequency.setValueAtTime(80, now);
                osc.frequency.linearRampToValueAtTime(40, now + 0.05);
                gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.05);
                osc.start(); osc.stop(now + 0.05); break;
            case 'coin':
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(); osc.stop(now + 0.1); break;
            case 'death':
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, now);
                osc.frequency.linearRampToValueAtTime(10, now + 0.5);
                gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.5);
                osc.start(); osc.stop(now + 0.5); break;
        }
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function createPlatform(x, width) {
        const type = buildingTypes[Math.floor(syncedRandom() * buildingTypes.length)];
        const height = 200 + syncedRandom() * (canvas.height * 0.4);
        return { x: x || canvas.width, y: canvas.height - height, width: width || 250 + syncedRandom() * 250, height, type, details: syncedRandom() };
    }

    function createMoney(platform) {
        if (syncedRandom() > 0.3) {
            items.push({ x: platform.x + (syncedRandom() * (platform.width - 40)), y: platform.y - 60 - syncedRandom() * 100, width: 30, height: 30, collected: false });
        }
    }

    function initGame(isReentry = false) {
        seedValue = Math.floor(Date.now() / 60000); 
        platforms = [createPlatform(50, 600)];
        items = [];
        
        player.x = isReentry ? 350 : 150;
        player.y = platforms[0].y - player.height - 10;
        player.vy = 0;
        player.rotation = 0;
        player.targetRotation = 0;
        money = 0;
        speed = BASE_SPEED;
        updateUI();
        
        for (let char in ghostSims) {
            ghostSims[char].y = player.y;
            ghostSims[char].vy = 0;
            ghostSims[char].rotation = 0;
        }

        for(let i=1; i<5; i++) {
            const last = platforms[platforms.length-1];
            const p = createPlatform(last.x + last.width + 120 + syncedRandom() * 180);
            platforms.push(p);
            createMoney(p);
        }
        document.getElementById('sync-status').innerText = "LIVE ON THE HIVE";
    }

    function updateUI() {
        document.getElementById('money-display').innerText = `BUDGET: $${money}`;
        if (money % 5 === 0) {
            document.getElementById('status-msg').innerText = headerQuotes[Math.floor(Math.random() * headerQuotes.length)];
        }
    }

    function jump() {
        if (gameState !== 'PLAYING') return;
        if (player.isGrounded) {
            set(globalActionRef, {
                type: 'jump',
                char: character,
                ts: Date.now()
            });
        }
    }

    function performJumpAction(entity) {
        if (!entity.isGrounded) return;
        entity.vy = jumpStrength;
        entity.isGrounded = false;
        entity.targetRotation += Math.PI * 2; 
        if (entity === player) playSfx('jump');
    }

    function updateEntityPhysics(entity, isLocal) {
        if (entity.status === 'DEAD') return;
        
        entity.vy += gravity;
        entity.y += entity.vy;
        
        if (!entity.isGrounded) {
            const rotSpeed = 0.15;
            if (entity.rotation < entity.targetRotation) {
                entity.rotation += rotSpeed;
                if (entity.rotation > entity.targetRotation) entity.rotation = entity.targetRotation;
            }
        } else {
            entity.rotation = 0;
            entity.targetRotation = 0;
        }

        const wasGrounded = entity.isGrounded;
        entity.isGrounded = false;
        
        platforms.forEach(p => {
            if (entity.x + entity.width > p.x && entity.x < p.x + p.width && 
                entity.y + entity.height > p.y && entity.y + entity.height < p.y + p.height + 20 && 
                entity.vy >= 0) {
                entity.y = p.y - entity.height; 
                entity.vy = 0; 
                entity.isGrounded = true;
                
                if (!wasGrounded && isLocal) {
                    playSfx('land');
                    gameContainer.classList.add('shake');
                    setTimeout(() => gameContainer.classList.remove('shake'), 200);
                }
            }
        });

        if (isLocal && entity.y > canvas.height) die();
    }

    function gameUpdate() {
        if (gameState !== 'PLAYING') return;
        
        speed += 0.0012; 
        seedValue += 0.001;

        updateEntityPhysics(player, true);

        const now = Date.now();
        for (let char in ghostSims) {
            const sim = ghostSims[char];
            if ((now - sim.lastUpdate) < 5000) {
                updateEntityPhysics(sim, false);
            }
        }

        platforms.forEach(p => p.x -= speed);
        items.forEach(item => {
            item.x -= speed;
            if (!item.collected && player.x < item.x + item.width && player.x + player.width > item.x && player.y < item.y + item.height && player.y + player.height > item.y) {
                item.collected = true; money++; updateUI(); playSfx('coin'); showMoneyToast(item.x, item.y);
            }
        });

        if (platforms.length > 0 && platforms[platforms.length-1].x < canvas.width) {
            const last = platforms[platforms.length-1];
            const p = createPlatform(last.x + last.width + 120 + syncedRandom() * 250);
            platforms.push(p); createMoney(p);
        }
        platforms = platforms.filter(p => p.x + p.width > -200);
        items = items.filter(i => i.x + i.width > -100 && !i.collected);
    }

    function showMoneyToast(x, y) {
        const t = document.createElement('div');
        t.className = 'money-toast';
        t.style.left = x + 'px'; t.style.top = y + 'px'; t.innerText = '+$1';
        gameContainer.appendChild(t);
        setTimeout(() => t.remove(), 800);
    }

    function die() {
        const reason = deathReasons[Math.floor(Math.random() * deathReasons.length)];
        set(ref(db, `players/${character}/status`), 'DEAD');
        push(deathEventsRef, { char: character, reason: reason, ts: Date.now() });

        gameState = 'DEAD';
        playSfx('death');
        document.getElementById('overlay').classList.remove('hidden');
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('death-screen').classList.remove('hidden');
        document.getElementById('lost-money').innerText = `$${money}`;
        document.getElementById('death-reason').innerText = reason;
        document.getElementById('death-quote').innerText = `"${deathQuotes[Math.floor(Math.random() * deathQuotes.length)]}"`;
        
        onValue(highRef, (snapshot) => {
            const currentHigh = snapshot.val() || 0;
            if (money > currentHigh) updateHighScore(money);
        }, { onlyOnce: true });

        let count = 5;
        const countDisplay = document.getElementById('countdown');
        countDisplay.innerText = count;
        const timer = setInterval(() => {
            count--;
            countDisplay.innerText = count;
            if (count <= 0) { 
                clearInterval(timer); 
                startGame(character, true);
            }
        }, 1000);
    }

    window.startGame = function(char, isReentry = false) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        character = char;
        document.getElementById('overlay').classList.add('hidden');
        document.getElementById('death-screen').classList.add('hidden');
        initGame(isReentry);
        gameState = 'PLAYING';
    };

    function drawPlatform(p) {
        ctx.save();
        let primary = '#2d3748', accent = '#1a202c';
        switch(p.type) {
            case 'BRICK': primary = '#742a2a'; accent = '#63171b'; break;
            case 'CONCRETE': primary = '#4a5568'; accent = '#2d3748'; break;
            case 'METAL': primary = '#2c5282'; accent = '#2a4365'; break;
            case 'STEEL': primary = '#2d3748'; accent = '#1a202c'; break;
        }
        ctx.fillStyle = primary; ctx.fillRect(p.x, p.y, p.width, p.height);
        ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(p.x + p.width - 20, p.y, 20, p.height);
        ctx.strokeStyle = accent; ctx.lineWidth = 2;
        if (p.type === 'STEEL') {
            ctx.beginPath();
            for(let i=0; i<p.width; i+=60) {
                ctx.moveTo(p.x+i, p.y); ctx.lineTo(p.x+i+60, p.y+p.height);
                ctx.moveTo(p.x+i+60, p.y); ctx.lineTo(p.x+i, p.y+p.height);
            }
            ctx.stroke();
        } else if (p.type === 'BRICK') {
            ctx.beginPath();
            for(let i=10; i<p.height; i+=20) { ctx.moveTo(p.x, p.y+i); ctx.lineTo(p.x+p.width, p.y+i); }
            ctx.stroke();
        } else if (p.type === 'CONCRETE') {
            ctx.fillStyle = '#111';
            for(let i=30; i<p.width-30; i+=50) {
                for(let j=30; j<p.height-30; j+=60) ctx.fillRect(p.x+i, p.y+j, 20, 30);
            }
        } else if (p.type === 'METAL') {
            ctx.beginPath();
            for(let i=0; i<p.width; i+=10) { ctx.moveTo(p.x+i, p.y); ctx.lineTo(p.x+i, p.y+p.height); }
            ctx.stroke();
        }
        ctx.fillStyle = '#222';
        if (p.details > 0.5) ctx.fillRect(p.x + 20, p.y - 20, 30, 20);
        if (p.details > 0.8) ctx.fillRect(p.x + p.width - 30, p.y - 40, 5, 40);
        ctx.fillStyle = '#ecc94b';
        for(let i=0; i<p.width; i+=20) { if ((i/20)%2 === 0) ctx.fillRect(p.x+i, p.y, 20, 5); }
        ctx.restore();
    }

    const charMap = { 'AVIRUP': '👷', 'LAMA': '🧔', 'MASOOM': '👨‍🏭', 'SAGAR': '👮', 'PRAVEEN': '🧑‍💻' };

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        platforms.forEach(drawPlatform);
        items.forEach(item => {
            if (!item.collected) {
                ctx.font = '30px Arial'; ctx.shadowColor = "yellow"; ctx.shadowBlur = 10;
                ctx.fillText('🤑', item.x, item.y + 25); ctx.shadowBlur = 0;
            }
        });

        const now = Date.now();
        for (let char in ghostSims) {
            const sim = ghostSims[char];
            if (char !== character && sim.status === 'ACTIVE' && (now - sim.lastUpdate) < 5000) {
                ctx.save();
                ctx.globalAlpha = 0.35;
                ctx.translate(sim.x + sim.width/2, sim.y + sim.height/2);
                ctx.rotate(sim.rotation);
                ctx.font = '40px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(charMap[char], 0, 0);
                ctx.restore();
            }
        }

        ctx.save();
        ctx.translate(player.x + player.width/2, player.y + player.height/2);
        ctx.rotate(player.rotation);
        ctx.font = '50px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(charMap[character] || '👤', 0, 0);
        ctx.restore();

        gameUpdate();
        requestAnimationFrame(draw);
    }

    window.addEventListener('mousedown', jump);
    window.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); }, {passive: false});
    window.addEventListener('keydown', (e) => { if (e.code === 'Space') jump(); });
    window.addEventListener('resize', resize);
    resize(); draw();
</script>
</body>
</html>
