<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Manager - Varroc Engineering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- html2pdf.js for dedicated card-size PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; margin: 0; padding: 0; }
        .mono-text { font-family: 'Space Mono', monospace; }
        
        .printable-card {
            width: 90mm;
            height: 54mm;
            background: white;
            border: none;
            padding: 4mm;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            -webkit-print-color-adjust: exact;
        }

        /* Temporary container for PDF capture - strictly 90x54 */
        #pdf-isolation-chamber {
            position: absolute;
            top: -10000px;
            left: -10000px;
            width: 90mm;
            height: 54mm;
            padding: 0 !important;
            margin: 0 !important;
            z-index: -9999;
            background: white;
            overflow: hidden;
        }

        .status-badge {
            position: absolute;
            top: 2mm;
            right: 2mm;
            font-size: 7px;
            font-weight: bold;
            padding: 1px 4px;
            border-radius: 2px;
            text-transform: uppercase;
        }

        .search-input:focus {
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.2);
            outline: none;
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- Isolation point for PDF capture -->
    <div id="pdf-isolation-chamber"></div>

    <header class="bg-slate-900 text-white py-6 shadow-xl">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
                <div>
                    <div class="flex items-center gap-3 mb-1">
                        <div class="w-8 h-8 bg-cyan-500 rounded flex items-center justify-center font-bold">INV</div>
                        <h1 class="text-2xl font-bold tracking-tight uppercase">Card Inventory Manager</h1>
                    </div>
                    <p class="text-slate-400 text-sm">Plant: VELp9 | Card Size: 90x54mm</p>
                </div>

                <div class="relative flex-grow max-w-lg">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </span>
                    <input type="text" id="searchInput" oninput="filterCards()" placeholder="Search Part Number, Name, or Location..." 
                        class="search-input w-full pl-10 pr-4 py-3 bg-slate-800 border border-slate-700 rounded-lg text-white placeholder-slate-500 transition-all">
                </div>
                
                <a href="index.html" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded text-sm font-semibold transition">Back to Dashboard</a>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-10">
        <div id="loading" class="text-center py-20">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-cyan-500 border-t-transparent mb-4"></div>
            <p class="text-slate-500 font-medium">Fetching inventory data...</p>
        </div>

        <div id="cardGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>

        <div id="noResults" class="hidden text-center py-20">
            <p class="text-slate-400 text-xl italic">No matching cards found.</p>
        </div>
    </main>

    <div id="toast" class="fixed bottom-20 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl transform translate-y-32 transition-transform duration-300 pointer-events-none z-50">
        Generating borderless PDF...
    </div>

    <footer class="fixed bottom-0 left-0 right-0 bg-white border-t py-4 shadow-2xl z-40">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center text-xs text-slate-500">
            <p>Developer: Avirup Chakraborty | Varroc Engineering Ltd.</p>
            <p id="statsDisplay">Total Items: 0</p>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.5.2/firebase-app.js";
        import { 
            getFirestore, collection, onSnapshot, doc, getDoc 
        } from "https://www.gstatic.com/firebasejs/10.5.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD-5Hjv6WZGU6jjGvzbNQGZq1N5eTxhS-4",
            authDomain: "kanban-171e6.firebaseapp.com",
            projectId: "kanban-171e6",
            storageBucket: "kanban-171e6.firebasestorage.app",
            messagingSenderId: "131597045172",
            appId: "1:131597045172:web:27177f11d68e495fbbb6e1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let inventory = [];

        async function fetchAllCards() {
            onSnapshot(collection(db, 'Cards'), async (snapshot) => {
                const promises = snapshot.docs.map(async (docSnap) => {
                    const data = docSnap.data();
                    let partName = "N/A";
                    if (data.Part && data.Location) {
                        try {
                            const partDoc = await getDoc(doc(db, 'Locations', data.Location, 'Parts', data.Part));
                            if (partDoc.exists()) partName = partDoc.data().Description || "N/A";
                        } catch (e) {}
                    }
                    return { id: docSnap.id, data: { ...data, PartName: partName } };
                });
                inventory = await Promise.all(promises);
                document.getElementById('loading').classList.add('hidden');
                renderAll();
            });
        }

        window.renderAll = (filteredData = inventory) => {
            const grid = document.getElementById('cardGrid');
            const noResults = document.getElementById('noResults');
            const stats = document.getElementById('statsDisplay');
            grid.innerHTML = '';
            
            if (filteredData.length === 0) {
                noResults.classList.remove('hidden');
                stats.textContent = `Items found: 0`;
                return;
            }

            noResults.classList.add('hidden');
            stats.textContent = `Total Items: ${filteredData.length}`;

            filteredData.forEach(card => {
                const isActive = card.data.Activation === true;
                const cardContainer = document.createElement('div');
                cardContainer.className = 'flex flex-col items-center gap-3';
                
                cardContainer.innerHTML = `
                    <div id="card-content-${card.id}" class="printable-card rounded-lg border border-slate-200 shadow-lg">
                        <div class="status-badge ${isActive ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-500'}">
                            ${isActive ? 'Active' : 'Inactive'}
                        </div>
                        <div class="flex justify-between h-full items-stretch">
                            <div class="flex flex-col justify-between w-[58%]">
                                <div class="space-y-1">
                                    <div>
                                        <h2 class="text-[7px] font-bold text-cyan-600 uppercase tracking-tighter">Part Number</h2>
                                        <p class="text-[14px] font-bold mono-text leading-none text-slate-900">${card.data.Part || '???'}</p>
                                    </div>
                                    <div>
                                        <h2 class="text-[7px] font-bold text-cyan-600 uppercase tracking-tighter">Description</h2>
                                        <p class="text-[9px] font-bold text-slate-700 leading-tight uppercase line-clamp-2">${card.data.PartName || 'NO DESCRIPTION'}</p>
                                    </div>
                                </div>
                                <div class="grid grid-cols-2 gap-1 mt-auto border-t border-slate-200 pt-1">
                                    <div>
                                        <h2 class="text-[6px] font-bold text-slate-400 uppercase">Quantity</h2>
                                        <p class="text-[14px] font-extrabold text-slate-900 leading-none">${card.data.Qt || 0}</p>
                                    </div>
                                    <div>
                                        <h2 class="text-[6px] font-bold text-slate-400 uppercase">Location</h2>
                                        <p class="text-[14px] font-extrabold text-slate-900 uppercase leading-none">${card.data.Location || 'N/A'}</p>
                                    </div>
                                </div>
                                <div class="mt-1 flex justify-between items-end">
                                    <div>
                                        <p class="text-[5px] text-slate-400 uppercase">Plant: VELp9</p>
                                        <p class="text-[5px] text-slate-300">ID: ${card.id.slice(0,12)}</p>
                                    </div>
                                    <p class="text-[5px] text-slate-300 italic mb-0.5">${new Date().toLocaleDateString()}</p>
                                </div>
                            </div>
                            <!-- Enlarged QR Section -->
                            <div class="w-[42%] flex flex-col items-center justify-center border-l border-dashed border-slate-200 pl-3">
                                <div id="qr-container-${card.id}" class="p-1 bg-white border border-slate-50"></div>
                                <p class="text-[7px] mt-2 font-black text-slate-500 text-center uppercase tracking-widest">SCAN FOR TRACKING</p>
                            </div>
                        </div>
                    </div>
                    <button onclick="downloadCardPDF('${card.id}', '${card.data.Part}')" 
                        class="w-full max-w-[90mm] flex items-center justify-center gap-2 py-2.5 bg-slate-800 hover:bg-blue-600 text-white rounded-lg font-bold text-sm transition-all shadow-md">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        DOWNLOAD PDF
                    </button>
                `;
                grid.appendChild(cardContainer);

                setTimeout(() => {
                    // Specific QR Data Format as requested
                    const qrPayload = {
                        "Parts document ID": card.data.Part || "N/A",
                        "Id": card.id,
                        "ArrivalLocation": card.data.Location || "N/A",
                        "Type": card.data.Type || "WIP",
                        "Qt": parseInt(card.data.Qt) || 0
                    };
                    
                    const container = document.getElementById(`qr-container-${card.id}`);
                    if (container) new QRCode(container, { 
                        text: JSON.stringify(qrPayload), 
                        width: 85, 
                        height: 85,
                        correctLevel: QRCode.CorrectLevel.M // Medium correction for dense JSON strings
                    });
                }, 50);
            });
        };

        window.downloadCardPDF = (id, partNum) => {
            const original = document.getElementById(`card-content-${id}`);
            const chamber = document.getElementById('pdf-isolation-chamber');
            const toast = document.getElementById('toast');
            
            toast.style.transform = 'translateY(0) translateX(-50%)';
            
            const clone = original.cloneNode(true);
            clone.style.boxShadow = 'none';
            clone.style.border = 'none';
            clone.style.margin = '0';
            clone.style.borderRadius = '0';
            
            const originalCanvas = original.querySelector('canvas');
            const cloneCanvasContainer = clone.querySelector('[id^="qr-container-"]');
            
            if (originalCanvas && cloneCanvasContainer) {
                cloneCanvasContainer.innerHTML = '';
                const newCanvas = document.createElement('canvas');
                newCanvas.width = originalCanvas.width;
                newCanvas.height = originalCanvas.height;
                newCanvas.getContext('2d').drawImage(originalCanvas, 0, 0);
                cloneCanvasContainer.appendChild(newCanvas);
            }

            chamber.innerHTML = '';
            chamber.appendChild(clone);
            
            const options = {
                margin: 0,
                filename: `Kanban_${partNum || 'ID'}.pdf`,
                image: { type: 'jpeg', quality: 1.0 },
                html2canvas: { 
                    scale: 4, 
                    useCORS: true, 
                    logging: false,
                    letterRendering: true,
                    scrollY: 0,
                    scrollX: 0,
                    backgroundColor: '#ffffff'
                },
                jsPDF: { 
                    unit: 'mm', 
                    format: [90, 54], 
                    orientation: 'landscape',
                    compress: true
                }
            };

            html2pdf().set(options).from(clone).save().then(() => {
                chamber.innerHTML = ''; 
                setTimeout(() => {
                    toast.style.transform = 'translateY(150%) translateX(-50%)';
                }, 2000);
            }).catch(err => {
                console.error("PDF Error:", err);
                chamber.innerHTML = '';
                toast.style.transform = 'translateY(150%) translateX(-50%)';
            });
        };

        window.filterCards = () => {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = inventory.filter(c => (
                c.data.Part?.toLowerCase().includes(query) ||
                c.data.PartName?.toLowerCase().includes(query) ||
                c.data.Location?.toLowerCase().includes(query)
            ));
            renderAll(filtered);
        };

        fetchAllCards();
    </script>
</body>
</html>
