<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stock Inventory Graph</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/date-fns@2.30.0/dist/date-fns.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .nav-btn { transition: all 0.2s ease; }
        .nav-btn.active { background-color: #0ea5e9; color: white; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .chart-container { height: 300px; position: relative; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); border: 1px solid #e2e8f0; }
        .mono-text { font-family: 'Space Mono', monospace; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="sticky top-0 z-50 bg-slate-900 text-white p-4 shadow-xl">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-sky-500 rounded-xl flex items-center justify-center font-bold text-white shadow-lg shadow-sky-500/30">V</div>
                <div>
                    <h1 class="font-bold text-lg leading-tight">STOCK ANALYTICS</h1>
                    <p class="text-[10px] text-sky-400 font-mono">VELP9 PLANT SYSTEMS</p>
                </div>
            </div>

            <div class="flex flex-wrap gap-2">
                <button onclick="changeLoc('IM')" id="nav-IM" class="nav-btn active px-4 py-1.5 rounded-lg text-sm font-semibold text-slate-400">IM</button>
                <button onclick="changeLoc('PU')" id="nav-PU" class="nav-btn px-4 py-1.5 rounded-lg text-sm font-semibold text-slate-400">PU</button>
                <button onclick="changeLoc('SA')" id="nav-SA" class="nav-btn px-4 py-1.5 rounded-lg text-sm font-semibold text-slate-400">SA</button>
                <button onclick="changeLoc('FG')" id="nav-FG" class="nav-btn px-4 py-1.5 rounded-lg text-sm font-semibold text-slate-400">FG</button>
            </div>

            <div class="relative w-full md:w-64">
                <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Search Part Number..." 
                       class="w-full bg-slate-800 border-none rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-sky-500 transition outline-none text-white">
                <svg class="w-4 h-4 absolute right-3 top-2.5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        <div id="graph-list" class="space-y-8">
            <div id="initial-loader" class="flex flex-col items-center justify-center py-20 text-slate-400 italic">
                <div class="w-8 h-8 border-4 border-sky-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                Initializing Inventory Data...
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.5.2/firebase-app.js";
        import { 
            getFirestore, collection, onSnapshot, getDocs, query, orderBy 
        } from "https://www.gstatic.com/firebasejs/10.5.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD-5Hjv6WZGU6jjGvzbNQGZq1N5eTxhS-4",
            authDomain: "kanban-171e6.firebaseapp.com",
            projectId: "kanban-171e6",
            storageBucket: "kanban-171e6.firebasestorage.app",
            messagingSenderId: "131597045172",
            appId: "1:131597045172:web:27177f11d68e495fbbb6e1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let currentLoc = 'IM';
        let searchQuery = '';
        let partsData = [];
        let charts = {};

        const destroyAllCharts = () => {
            Object.keys(charts).forEach(key => charts[key].destroy());
            charts = {};
        };

        window.changeLoc = (loc) => {
            if (currentLoc === loc) return;
            currentLoc = loc;
            destroyAllCharts();
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`nav-${loc}`).classList.add('active');
            fetchParts();
        };

        window.handleSearch = () => {
            searchQuery = document.getElementById('searchInput').value.toLowerCase();
            renderGraphs();
        };

        const fetchParts = () => {
            const partsRef = collection(db, `Locations/${currentLoc}/Parts`);
            onSnapshot(partsRef, (snapshot) => {
                partsData = snapshot.docs
                    .map(d => ({ id: d.id, ...d.data() }))
                    .sort((a, b) => (Number(b.QT) || 0) - (Number(a.QT) || 0));
                renderGraphs();
            }, (error) => console.error("Snapshot error:", error));
        };

        const fetchEvents = async (partId) => {
            const eventsRef = collection(db, `Locations/${currentLoc}/Parts/${partId}/Events`);
            const q = query(eventsRef, orderBy('Time', 'desc'));
            try {
                const snap = await getDocs(q);
                return snap.docs.map(d => ({
                    id: d.id,
                    Qt: Number(d.data().Qt) || 0,
                    Time: d.data().Time?.toDate() || new Date()
                }));
            } catch (err) {
                console.error("Error fetching events for " + partId, err);
                return [];
            }
        };

        const renderGraphs = async () => {
            const container = document.getElementById('graph-list');
            destroyAllCharts();
            container.innerHTML = '';
            
            const filtered = partsData.filter(p => p.id.toLowerCase().includes(searchQuery));

            if (filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-slate-400">No parts found matching your criteria.</div>`;
                return;
            }

            for (const part of filtered) {
                const partDiv = document.createElement('div');
                partDiv.className = 'glass-card rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition mb-8';
                partDiv.innerHTML = `
                    <div class="p-6 border-b border-slate-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div>
                            <h3 class="text-lg font-bold text-slate-800 mono-text">${part.id}</h3>
                            <p class="text-xs text-slate-500 font-medium">${part.Description || 'No description available'}</p>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="text-right">
                                <span class="block text-[10px] font-bold text-slate-400 uppercase">Live Stock</span>
                                <span class="text-2xl font-black text-sky-600">${part.QT || 0}</span>
                            </div>
                            <div class="flex bg-slate-100 p-1 rounded-lg">
                                <button onclick="updateChartScale('${part.id}', 1)" class="scale-btn px-3 py-1 text-[10px] font-bold rounded-md hover:bg-white transition" id="btn-1-${part.id}">1D</button>
                                <button onclick="updateChartScale('${part.id}', 15)" class="scale-btn px-3 py-1 text-[10px] font-bold rounded-md hover:bg-white transition" id="btn-15-${part.id}">15D</button>
                                <button onclick="updateChartScale('${part.id}', 30)" class="scale-btn px-3 py-1 text-[10px] font-bold rounded-md bg-white shadow-sm transition" id="btn-30-${part.id}">30D</button>
                            </div>
                        </div>
                    </div>
                    <div class="p-6 bg-white/50">
                        <div class="chart-container">
                            <canvas id="chart-${part.id}"></canvas>
                        </div>
                    </div>
                `;
                container.appendChild(partDiv);
                initChart(part.id, part.QT || 0);
            }
        };

        window.updateChartScale = async (partId, days) => {
            const chart = charts[partId];
            if (!chart) return;

            [1, 15, 30].forEach(d => {
                const b = document.getElementById(`btn-${d}-${partId}`);
                if (b) {
                    if (d === days) b.classList.add('bg-white', 'shadow-sm');
                    else b.classList.remove('bg-white', 'shadow-sm');
                }
            });

            const part = partsData.find(p => p.id === partId);
            const events = await fetchEvents(partId);
            
            let dataPoints = [];
            let currentRunningStock = Number(part.QT) || 0;
            const now = new Date();
            const cutoff = new Date(now.getTime() - (days * 24 * 60 * 60 * 1000));

            dataPoints.push({ x: now, y: currentRunningStock });

            for (let event of events) {
                if (event.Time >= cutoff) {
                    dataPoints.push({ x: event.Time, y: currentRunningStock });
                    currentRunningStock = currentRunningStock - event.Qt;
                } else {
                    dataPoints.push({ x: cutoff, y: currentRunningStock });
                    currentRunningStock = currentRunningStock - event.Qt;
                    break;
                }
            }

            if (dataPoints.length === 1 || dataPoints[dataPoints.length-1].x > cutoff) {
                dataPoints.push({ x: cutoff, y: currentRunningStock });
            }

            chart.data.datasets[0].data = dataPoints.sort((a,b) => a.x - b.x);
            chart.options.scales.x.min = cutoff;
            chart.options.scales.x.max = now;
            chart.update('none');
        };

        const initChart = (partId, currentQty) => {
            const canvas = document.getElementById(`chart-${partId}`);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            
            const gradient = ctx.createLinearGradient(0, 0, 0, 300);
            gradient.addColorStop(0, 'rgba(14, 165, 233, 0.2)');
            gradient.addColorStop(1, 'rgba(14, 165, 233, 0)');

            charts[partId] = new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [{
                        label: 'Stock Level',
                        data: [{ x: new Date(), y: Number(currentQty) || 0 }],
                        borderColor: '#0ea5e9',
                        borderWidth: 2,
                        pointRadius: 4,
                        pointHoverRadius: 6,
                        fill: true,
                        backgroundColor: gradient,
                        tension: 0 // Set to 0 for perfectly straight lines
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    interaction: { intersect: false, mode: 'index' },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#0f172a',
                            padding: 12,
                            cornerRadius: 8,
                            titleFont: { size: 10 },
                            bodyFont: { weight: 'bold' }
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: { 
                                unit: 'day',
                                displayFormats: { day: 'MMM d', hour: 'HH:mm' }
                            },
                            grid: { display: false },
                            ticks: { font: { size: 10 }, color: '#94a3b8' }
                        },
                        y: {
                            beginAtZero: true,
                            grid: { color: '#f1f5f9' },
                            ticks: { font: { size: 10 }, color: '#94a3b8' }
                        }
                    }
                }
            });

            updateChartScale(partId, 30);
        };

        fetchParts();
    </script>
</body>
</html>
