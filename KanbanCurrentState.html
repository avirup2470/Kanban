<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2621716039502502"
     crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Page Kanban Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --im-color: #374151;
            --pu-color: #dc2626;
            --sa-color: #1d4ed8;
            --fg-color: #5b21b6;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
            min-height: 100vh;
        }

        .nav-btn {
            transition: all 0.3s ease;
            border-bottom: 4px solid transparent;
        }

        .nav-btn.active {
            border-bottom-color: currentColor;
            background-color: rgba(255, 255, 255, 0.1);
        }

        .card-item {
            cursor: pointer;
            border-radius: 0.75rem;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.3s;
            background: white;
            border: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .card-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .card-red {
            border-top-color: #ef4444 !important;
            background-color: #fef2f2;
            border-left: 1px solid #fee2e2;
            border-right: 1px solid #fee2e2;
            border-bottom: 1px solid #fee2e2;
        }

        .mono-text { font-family: 'Space Mono', monospace; }

        .card-details {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out, opacity 0.3s ease-out;
        }

        .card-item.is-expanded .card-details {
            max-height: 2000px;
            opacity: 1;
            padding-top: 1rem;
        }

        .toggle-icon { transition: transform 0.3s; }
        .card-item.is-expanded .toggle-icon { transform: rotate(180deg); }

        .qr-container {
            background: white;
            padding: 0.5rem;
            border-radius: 0.5rem;
            display: inline-block;
        }

        .page-view { display: none; }
        .page-view.active { display: block; }

        .part-group-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            padding: 1.5rem;
            background: rgba(0, 0, 0, 0.02);
            border-radius: 1rem;
            border: 1px dashed #d1d5db;
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .fifo-violation-pulse {
            animation: pulse-red 2s infinite;
        }
    </style>
</head>
<body class="flex flex-col">

    <nav class="sticky top-0 z-50 bg-slate-900 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 bg-cyan-500 rounded-lg flex items-center justify-center font-bold">K</div>
                <span class="text-xl font-bold tracking-tight">KANBAN FLOW</span>
            </div>
            <div class="flex flex-wrap justify-center gap-2">
                <button onclick="showPage('IM')" id="nav-IM" class="nav-btn active px-4 py-2 text-sm font-semibold text-gray-300 hover:text-white transition">IM (Moulding)</button>
                <button onclick="showPage('PU')" id="nav-PU" class="nav-btn px-4 py-2 text-sm font-semibold text-red-400 hover:text-white transition">PU (Foam)</button>
                <button onclick="showPage('SA')" id="nav-SA" class="nav-btn px-4 py-2 text-sm font-semibold text-blue-400 hover:text-white transition">SA (Assembly)</button>
                <button onclick="showPage('FG')" id="nav-FG" class="nav-btn px-4 py-2 text-sm font-semibold text-purple-400 hover:text-white transition">FG (Goods)</button>
            </div>
        </div>
    </nav>

    <main class="flex-grow p-4 md:p-8">
        <div class="max-w-7xl mx-auto">
            <div class="mb-6 flex flex-col md:flex-row md:items-end justify-between gap-4">
                <div>
                    <h1 id="page-title" class="text-3xl font-extrabold text-slate-800">Injection Moulding (IM)</h1>
                    <p id="status-message" class="text-slate-500 mt-1">Connecting...</p>
                </div>
                <div id="loading-indicator" class="flex items-center space-x-2 text-cyan-600 animate-pulse">
                    <div class="w-3 h-3 bg-current rounded-full"></div>
                    <span>Live Syncing...</span>
                </div>
            </div>

            <div id="page-IM" class="page-view active"><div id="im-cards" class="flex flex-col gap-8"></div></div>
            <div id="page-PU" class="page-view"><div id="pu-cards" class="flex flex-col gap-8"></div></div>
            <div id="page-SA" class="page-view"><div id="sa-cards" class="flex flex-col gap-8"></div></div>
            <div id="page-FG" class="page-view"><div id="fg-cards" class="flex flex-col gap-8"></div></div>

            <div id="empty-state" class="hidden flex flex-col items-center justify-center py-20 text-slate-400">
                <p class="text-xl font-medium">No active cards found</p>
            </div>
        </div>
    </main>

    <footer class="bg-slate-900 text-gray-400 py-10 border-t border-slate-800 mt-12">
        <div class="max-w-7xl mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-8">
            <div><h3 class="text-white font-bold text-lg mb-4 uppercase">Contact</h3><p class="text-sm">+91 8509068803</p></div>
            <div><h3 class="text-white font-bold text-lg mb-4 uppercase">Developer</h3><p class="text-sm">Avirup Chakraborty</p></div>
            <div><h3 class="text-white font-bold text-lg mb-4 uppercase">Facility</h3><p class="text-sm">Varroc Engineering Ltd. (VELp9)</p></div>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD-5Hjv6WZGU6jjGvzbNQGZq1N5eTxhS-4",
            authDomain: "kanban-171e6.firebaseapp.com",
            projectId: "kanban-171e6",
            storageBucket: "kanban-171e6.firebasestorage.app",
            messagingSenderId: "131597045172",
            appId: "1:131597045172:web:27177f11d68e495fbbb6e1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let currentView = 'IM';
        let allCards = [];

        const pageData = {
            'IM': { title: 'Injection Moulding (IM)', container: 'im-cards' },
            'PU': { title: 'Poly-URETHANE Foam (PU)', container: 'pu-cards' },
            'SA': { title: 'Seat Assembly (SA)', container: 'sa-cards' },
            'FG': { title: 'Finished Goods (FG)', container: 'fg-cards' }
        };

        const calculateFifoPercentage = async (partNumber, location) => {
            const dateObj = new Date();
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            const dateId = `${monthNames[dateObj.getMonth()]}${dateObj.getFullYear().toString().slice(-2)}`;
            const docRef = doc(db, `Locations/${location}/Parts/${partNumber}/FIFO/${dateId}`);
            try {
                const snap = await getDoc(docRef);
                if (!snap.exists()) return 100;
                const d = snap.data();
                return d.TotalCount === 0 ? 100 : Math.round((d.FIFOCount / d.TotalCount) * 100);
            } catch (e) { return "??"; }
        };

        window.showPage = (location) => {
            currentView = location;
            document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${location}`).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`nav-${location}`).classList.add('active');
            document.getElementById('page-title').textContent = pageData[location].title;
            renderCards();
        };

        const createCardElement = (card) => {
            const isRed = card.data.Red === true;
            const formatDate = (v) => v?.toMillis ? v.toDate().toLocaleString() : 'N/A';
            const activationStr = formatDate(card.data.LastActivated);
            
            const fields = Object.entries(card.data)
                .filter(([k]) => !['Activation', 'Part', 'Location', 'Qt', 'LastActivated', 'Red', 'TrollyNo'].includes(k))
                .map(([k, v]) => `
                    <div class="py-2 border-b border-gray-100 last:border-0">
                        <span class="text-[10px] font-bold text-gray-400 uppercase tracking-tighter">${k}</span>
                        <div class="text-xs font-medium text-gray-700">${typeof v === 'object' ? '...' : v}</div>
                    </div>
                `).join('');

            return `
                <div class="card-item shadow-sm border-t-4 ${isRed ? 'border-red-500 card-red fifo-violation-pulse' : 'border-slate-500'}" onclick="this.classList.toggle('is-expanded')">
                    <div class="p-5">
                        <div class="flex justify-between items-start mb-4">
                            <div class="flex-grow">
                                <span class="text-[10px] font-bold text-gray-400 uppercase">Part Number</span>
                                <h3 class="text-xl font-bold mono-text break-all">${card.data.Part || 'N/A'}</h3>
                            </div>
                            <div class="px-2 py-1 rounded text-xs font-bold bg-gray-100 text-gray-700 whitespace-nowrap ml-2">${card.data.Qt} units</div>
                        </div>

                        <div class="mb-4">
                            <span class="text-[10px] font-bold text-slate-400 uppercase">Trolley Number</span>
                            <div class="text-4xl font-black text-slate-900 tracking-tighter">${card.data.TrollyNo || 'N/A'}</div>
                        </div>

                        <div class="flex flex-col gap-1 mb-3">
                            <span class="text-[10px] font-bold ${isRed ? 'text-red-400' : 'text-gray-400'} uppercase">${isRed ? '⚠️ FIFO VIOLATION DETECTED' : 'Last Activated'}</span>
                            <span class="text-xs font-semibold text-slate-700 mono-text">${activationStr}</span>
                        </div>

                        <div class="flex justify-between items-center text-gray-400 pt-2 border-t border-gray-50">
                            <span class="text-[10px] mono-text">ID: ${card.id}</span>
                            <svg class="w-5 h-5 toggle-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                        </div>

                        <div class="card-details">
                            <div class="flex flex-col items-center mb-4 p-4 bg-gray-50 rounded">
                                <div id="qr-${card.id}" class="qr-container shadow-inner"></div>
                            </div>
                            <div class="space-y-1">
                                ${fields}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        };

        const renderCards = async () => {
            const container = document.getElementById(pageData[currentView].container);
            const emptyState = document.getElementById('empty-state');
            container.innerHTML = '';
            
            let filtered = allCards.filter(c => c.data.Location === currentView && c.data.Activation === true);
            if (filtered.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            const groups = filtered.reduce((acc, card) => {
                const part = card.data.Part || 'NO_PART';
                if (!acc[part]) acc[part] = [];
                acc[part].push(card);
                return acc;
            }, {});

            for (const partKey of Object.keys(groups).sort()) {
                const groupCards = groups[partKey];
                groupCards.sort((a, b) => (a.data.LastActivated?.toMillis() || 0) - (b.data.LastActivated?.toMillis() || 0));

                const fifoVal = await calculateFifoPercentage(partKey, currentView);
                const header = `
                    <div class="flex items-center gap-4 mt-4 mb-2">
                        <span class="bg-white px-4 py-1 rounded-full border border-gray-200 text-sm font-bold text-gray-500">PART: ${partKey}</span>
                        <span class="px-3 py-1 rounded-full border text-xs font-bold ${fifoVal >= 90 ? 'bg-green-50 text-green-700' : 'bg-amber-50 text-amber-700'}">FIFO: ${fifoVal}%</span>
                    </div>
                `;
                
                const rowDiv = document.createElement('div');
                rowDiv.className = 'part-group-row';
                
                groupCards.forEach(card => {
                    rowDiv.insertAdjacentHTML('beforeend', `<div class="w-full sm:w-[calc(50%-0.75rem)] lg:w-[calc(33.333%-1rem)] xl:w-[calc(25%-1.15rem)] min-w-[300px]">${createCardElement(card)}</div>`);
                    setTimeout(() => {
                        const payload = JSON.stringify([{"Parts document ID": card.data.Part, "Id": card.id, "ArrivalLocation": card.data.Location, "Type": card.data.Type || "WIP", "Qt": card.data.Qt}]);
                        new QRCode(document.getElementById(`qr-${card.id}`), { text: payload, width: 120, height: 120 });
                    }, 100);
                });

                container.insertAdjacentHTML('beforeend', header);
                container.appendChild(rowDiv);
            }
        };

        onSnapshot(collection(db, 'Cards'), (snapshot) => {
            allCards = snapshot.docs.map(d => ({ id: d.id, data: d.data() }));
            document.getElementById('loading-indicator').classList.add('hidden');
            renderCards();
        });

    </script>
</body>
</html>
